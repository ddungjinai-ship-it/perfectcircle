<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>완벽한 원 그리기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #f5f0e8;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
  }
  #canvas { display: block; cursor: crosshair; touch-action: none; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,200,220,0.15) 39px, rgba(180,200,220,0.15) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,200,220,0.1) 39px, rgba(180,200,220,0.1) 40px);
    pointer-events: none; z-index: 1;
  }
  body::after {
    content: '';
    position: fixed; inset: 8px;
    border: 3px solid #c8bfa8;
    border-radius: 4px;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.15);
    pointer-events: none; z-index: 2;
  }

  #ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  #header {
    position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    text-align: center;
  }
  #header h1 { font-size: 22px; font-weight: 700; color: #4a3f35; letter-spacing: 2px; text-shadow: 1px 1px 0 rgba(255,255,255,0.8); }
  #header p  { font-size: 13px; color: #8a7a6a; margin-top: 4px; letter-spacing: 1px; }

  /* ── 결과 패널 ── */
  #result-panel {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    display: flex; gap: 20px; align-items: flex-start;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s;
  }
  #result-panel.show { opacity: 1; pointer-events: all; }

  .panel-box {
    background: rgba(255,252,245,0.92);
    border: 2px solid #d6cab4;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(74,63,53,0.18), inset 0 1px 0 rgba(255,255,255,0.9);
    backdrop-filter: blur(4px);
    padding: 24px 28px;
  }

  /* 현재 점수 박스 */
  #score-box { min-width: 200px; text-align: center; }
  #score-box .box-title { font-size: 12px; color: #8a7a6a; letter-spacing: 2px; font-weight: 600; margin-bottom: 12px; }

  .score-table { width: 100%; border-collapse: collapse; }
  .score-table td {
    padding: 7px 10px;
    border-bottom: 1px dashed #d6cab4;
    font-size: 14px; color: #4a3f35;
  }
  .score-table td:first-child { color: #8a7a6a; font-size: 12px; letter-spacing: 1px; white-space: nowrap; }
  .score-table td:last-child  { text-align: right; font-weight: 700; }
  .score-table tr:last-child td { border-bottom: none; }

  #big-score {
    font-size: 72px; font-weight: 900; line-height: 1;
    background: linear-gradient(135deg, #2c7be5, #6f42c1);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 8px rgba(44,123,229,0.25));
    margin: 10px 0 4px;
  }
  #big-score.perfect {
    background: linear-gradient(135deg, #fd7e14, #ffc107);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: glowPulse 0.7s ease infinite alternate;
  }
  @keyframes glowPulse { to { filter: drop-shadow(0 4px 20px rgba(255,193,7,0.85)); } }

  #grade-label { font-size: 20px; margin-bottom: 16px; animation: bounceIn 0.5s cubic-bezier(.34,1.56,.64,1); }
  @keyframes bounceIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  #retry-btn {
    width: 100%; margin-top: 16px;
    padding: 10px 0;
    background: #4a3f35; color: #f5f0e8;
    border: none; border-radius: 24px;
    font-size: 14px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; pointer-events: all;
    box-shadow: 0 4px 14px rgba(74,63,53,0.28);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #retry-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(74,63,53,0.38); }
  #retry-btn:active { transform: translateY(0); }

  /* 랭킹 박스 */
  #rank-box { min-width: 240px; }
  #rank-box .box-title { font-size: 12px; color: #8a7a6a; letter-spacing: 2px; font-weight: 600; margin-bottom: 12px; text-align: center; }

  .rank-table { width: 100%; border-collapse: collapse; }
  .rank-table th {
    font-size: 11px; color: #8a7a6a; font-weight: 600;
    letter-spacing: 1px; padding: 4px 8px 8px;
    border-bottom: 2px solid #d6cab4; text-align: center;
  }
  .rank-table th:last-child { text-align: right; }
  .rank-table td {
    padding: 7px 8px;
    font-size: 13px; color: #4a3f35;
    border-bottom: 1px dashed #e8e0d0;
    text-align: center;
  }
  .rank-table td:last-child { text-align: right; font-weight: 700; }
  .rank-table tr:last-child td { border-bottom: none; }
  .rank-table tr.current-row td { background: rgba(44,123,229,0.08); font-weight: 700; color: #2c7be5; }
  .rank-table tr.current-row td:last-child { color: #2c7be5; }

  .rank-medal { font-size: 15px; }
  .rank-num   { font-size: 12px; color: #a09080; font-weight: 600; }

  /* 힌트 */
  #hint {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-size: 13px; color: #a09080; letter-spacing: 1px;
    transition: opacity 0.5s;
  }
  #marker-icon { position: absolute; bottom: 24px; left: 40px; font-size: 22px; opacity: 0.4; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="header">
    <h1>⭕ 완벽한 원 그리기</h1>
    <p>마우스나 손가락으로 원을 그려보세요</p>
  </div>

  <div id="result-panel">
    <!-- 현재 점수 -->
    <div class="panel-box" id="score-box">
      <div class="box-title">📊 이번 결과</div>
      <div id="big-score">0%</div>
      <div id="grade-label"></div>
      <table class="score-table">
        <tr><td>반지름 균일도</td><td id="r-uniform">-</td></tr>
        <tr><td>각도 커버리지</td><td id="r-coverage">-</td></tr>
        <tr><td>최종 점수</td><td id="r-final">-</td></tr>
        <tr><td>등급</td><td id="r-grade">-</td></tr>
      </table>
      <button id="retry-btn" onclick="resetGame()">다시 그리기 ↺</button>
    </div>

    <!-- 최고 기록 TOP 10 -->
    <div class="panel-box" id="rank-box">
      <div class="box-title">🏆 최고 기록 TOP 10</div>
      <table class="rank-table">
        <thead>
          <tr>
            <th>순위</th>
            <th style="text-align:left">등급</th>
            <th>점수</th>
          </tr>
        </thead>
        <tbody id="rank-body">
          <tr><td colspan="3" style="color:#b0a090;font-size:12px;padding:16px 0">아직 기록이 없어요</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="hint">원을 그리고 손을 떼세요</div>
  <div id="marker-icon">🖊️</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const resultPanel = document.getElementById('result-panel');
const bigScore    = document.getElementById('big-score');
const gradeLabel  = document.getElementById('grade-label');
const hint        = document.getElementById('hint');
const rankBody    = document.getElementById('rank-body');

let W, H, drawing = false, points = [], phase = 'idle';
let history = []; // { score, grade, uniform, coverage }
let currentIdx = -1;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

/* ── 분석 ── */
function analyzeCircle(pts) {
  if (pts.length < 20) return null;
  let cx = 0, cy = 0;
  for (const p of pts) { cx += p.x; cy += p.y; }
  cx /= pts.length; cy /= pts.length;

  const radii  = pts.map(p => Math.hypot(p.x - cx, p.y - cy));
  const rMean  = radii.reduce((a, b) => a + b, 0) / radii.length;
  const rStd   = Math.sqrt(radii.reduce((s, r) => s + (r - rMean) ** 2, 0) / radii.length);

  const buckets = new Array(36).fill(false);
  for (const p of pts) {
    const a = Math.atan2(p.y - cy, p.x - cx);
    buckets[Math.floor(((a + Math.PI) / (2 * Math.PI)) * 36) % 36] = true;
  }
  const coverage  = buckets.filter(Boolean).length / 36;
  const uniformity = Math.max(0, 1 - (rStd / rMean) * 1.4);
  const score = Math.round(Math.min(100, (uniformity * 0.8 + coverage * 0.2) * 108));

  return { cx, cy, r: rMean, score,
    uniform: Math.round(uniformity * 100),
    coverage: Math.round(coverage * 100) };
}

function getGrade(s) {
  if (s >= 99) return { emoji: '🏆', label: '전설급!' };
  if (s >= 95) return { emoji: '🌟', label: '완벽해요!' };
  if (s >= 85) return { emoji: '✨', label: '훌륭해요!' };
  if (s >= 70) return { emoji: '👍', label: '꽤 잘했어요' };
  if (s >= 50) return { emoji: '🙂', label: '나쁘지 않아요' };
  return { emoji: '😅', label: '다시 도전!' };
}

/* ── 랭킹 테이블 ── */
function updateRankTable(highlightIdx) {
  if (history.length === 0) {
    rankBody.innerHTML = '<tr><td colspan="3" style="color:#b0a090;font-size:12px;padding:16px 0">아직 기록이 없어요</td></tr>';
    return;
  }
  const sorted = [...history].sort((a, b) => b.score - a.score).slice(0, 10);
  rankBody.innerHTML = sorted.map((h, i) => {
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `<span class="rank-num">${i+1}</span>`;
    const isCurrent = (h === history[highlightIdx]);
    return `<tr class="${isCurrent ? 'current-row' : ''}">
      <td>${medal}</td>
      <td style="text-align:left">${h.grade.emoji} ${h.grade.label}</td>
      <td>${h.score}%</td>
    </tr>`;
  }).join('');
}

/* ── 결과 표시 ── */
function showResult(result) {
  phase = 'result';
  const { cx, cy, r, score, uniform, coverage } = result;
  const grade = getGrade(score);

  // 완벽한 원 오버레이
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = score >= 85 ? 'rgba(40,167,69,0.45)' : 'rgba(220,53,69,0.38)';
  ctx.lineWidth = 2; ctx.setLineDash([8, 6]); ctx.stroke(); ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(74,63,53,0.35)'; ctx.fill();

  // 기록 저장
  history.push({ score, grade, uniform, coverage });
  currentIdx = history.length - 1;

  // 점수 테이블 채우기
  document.getElementById('r-uniform').textContent  = uniform + '%';
  document.getElementById('r-coverage').textContent = coverage + '%';
  document.getElementById('r-final').textContent    = score + '%';
  document.getElementById('r-grade').textContent    = grade.emoji + ' ' + grade.label;

  // 큰 점수 애니메이션
  bigScore.classList.remove('perfect');
  gradeLabel.textContent = '';
  resultPanel.classList.add('show');

  let cur = 0;
  const step = () => {
    cur = Math.min(cur + Math.ceil((score - cur) / 6 + 1), score);
    bigScore.textContent = cur + '%';
    if (cur < score) requestAnimationFrame(step);
    else {
      gradeLabel.textContent = grade.emoji + ' ' + grade.label;
      if (score >= 95) bigScore.classList.add('perfect');
      updateRankTable(currentIdx);
    }
  };
  requestAnimationFrame(step);
  updateRankTable(currentIdx);
}

function resetGame() {
  drawing = false; phase = 'idle'; points = [];
  resultPanel.classList.remove('show');
  bigScore.classList.remove('perfect');
  ctx.clearRect(0, 0, W, H);
  setTimeout(() => { hint.style.opacity = '1'; }, 400);
}

/* ── 드로잉 ── */
function startDraw(x, y) {
  if (phase === 'result') return;
  drawing = true; phase = 'drawing'; points = [{ x, y }];
  hint.style.opacity = '0';
  ctx.clearRect(0, 0, W, H);
  ctx.beginPath(); ctx.moveTo(x, y);
}
function moveDraw(x, y) {
  if (!drawing) return;
  points.push({ x, y });
  ctx.lineTo(x, y);
  ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 3.5;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y);
}
function endDraw() {
  if (!drawing) return;
  drawing = false;
  const result = analyzeCircle(points);
  if (!result) { resetGame(); return; }
  showResult(result);
}

/* ── 이벤트 ── */
const pos = e => {
  const r = canvas.getBoundingClientRect();
  return e.touches
    ? { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top }
    : { x: e.clientX - r.left, y: e.clientY - r.top };
};
canvas.addEventListener('mousedown',  e => { const p = pos(e); startDraw(p.x, p.y); });
canvas.addEventListener('mousemove',  e => { const p = pos(e); moveDraw(p.x, p.y);  });
canvas.addEventListener('mouseup',    endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); const p = pos(e); startDraw(p.x, p.y); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); const p = pos(e); moveDraw(p.x, p.y);  }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); endDraw(); }, { passive: false });
</script>
</body>
</html>
